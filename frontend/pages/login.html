<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Login - Industrial Attendance</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">
    <div class="login-background-slideshow">
        <div class="background-slide active" style="background-image: url('../assets/osni-shelby-myYJwwoqRdg-unsplash.jpg')"></div>
        <div class="background-slide" style="background-image: url('../assets/cosmos_1138209719.jpeg')"></div>
        <div class="background-slide" style="background-image: url('../assets/cosmos_1204335269.jpeg')"></div>
        <div class="background-slide" style="background-image: url('../assets/cosmos_219021497.jpeg')"></div>
        <div class="background-overlay"></div>
    </div>

    <!-- Main Container oriented to the right -->
    <div class="login-container">
        <div class="login-form-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="../assets/logo.png" alt="Vidvat Solutions Logo" style="max-width: 100%; height: auto; max-height: 75px; object-fit: contain; border-radius: 12px; margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto;">
                <h1 style="color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: 0.02em; margin: 0; text-transform: uppercase;">VIDVAT SOLUTIONS</h1>
                <p style="color: var(--text-dim); margin-top: 0.4rem;">Attendance Portal</p>
            </div>

            <form id="loginForm">
                <div style="margin-bottom: 1.5rem; text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600;">Supervisor Username</label>
                    <input type="text" id="username" value="admin" style="width: 100%;" required>
                </div>
                <div style="margin-bottom: 2rem; text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600;">Access Password</label>
                    <input type="password" id="password" value="admin123" style="width: 100%;" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Authenticate</button>
            </form>

            <p id="errorMsg" class="error-message">Invalid credentials</p>
        </div>
    </div>


    <script src="../js/login.js"></script>
</body>
</html>
