<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Login - Industrial Attendance</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">
    <div class="login-background-slideshow">
        <div class="background-slide active" style="background-image: url('../assets/osni-shelby-myYJwwoqRdg-unsplash.jpg')"></div>
        <div class="background-slide" style="background-image: url('../assets/cosmos_1138209719.jpeg')"></div>
        <div class="background-slide" style="background-image: url('../assets/cosmos_1204335269.jpeg')"></div>
        <div class="background-slide" style="background-image: url('../assets/cosmos_219021497.jpeg')"></div>
        <div class="background-overlay"></div>
    </div>

    <!-- Main Container oriented to the right -->
    <div class="login-container">
        <div class="login-form-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="../assets/logo.png" alt="Vidvat Solutions Logo" style="max-width: 100%; height: auto; max-height: 75px; object-fit: contain; border-radius: 12px; margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto;">
                <h1 style="color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: 0.02em; margin: 0; text-transform: uppercase;">VIDVAT SOLUTIONS</h1>
                <p style="color: var(--text-dim); margin-top: 0.4rem;">Attendance Portal</p>
            </div>

            <form id="loginForm">
                <h2 id="formTitle" style="text-align: center; color: var(--text-main); margin-bottom: 1.5rem;">Supervisor Login</h2>
                <div style="margin-bottom: 1.2rem; text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600;">Supervisor Username</label>
                    <input type="text" id="username" placeholder="Enter username" style="width: 100%;" required>
                </div>
                <div style="margin-bottom: 1.2rem; text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600;">Access Password</label>
                    <input type="password" id="password" placeholder="Enter password" style="width: 100%;" required>
                </div>
                <div id="confirmPasswordGroup" style="margin-bottom: 1.5rem; text-align: left; display: none;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600;">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" style="width: 100%;">
                </div>
                
                <div id="forgotPasswordLink" style="text-align: right; margin-bottom: 1.5rem;">
                    <a href="#" id="forgotBtn" style="color: var(--text-dim); font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" id="submitBtn" class="btn btn-primary" style="flex: 2; padding: 1rem;">Authenticate</button>
                    <button type="button" id="resetBtn" class="btn" style="flex: 1; padding: 1rem; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-dim); display: none;">Reset</button>
                </div>
            </form>

            <p id="errorMsg" class="error-message"></p>
            <p id="successMsg" style="color: #4caf50; text-align: center; display: none; margin-top: 1rem;"></p>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <p id="toggleText" style="color: var(--text-dim);">Don't have an account? <a href="#" id="toggleAuth" style="color: var(--accent-primary); font-weight: 600; text-decoration: none;">Register Now</a></p>
            </div>
        </div>
    </div>


    <script src="../js/login.js"></script>
</body>
</html>
